<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Hero V1220</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #020617; --card: rgba(30, 41, 59, 0.9); --accent: #38bdf8; --success: #4ade80; --danger: #f87171; --gold: #fbbf24; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: #020617; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
        .container { width: 100%; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: relative; background: radial-gradient(circle at top, #1e293b, #020617); }
        .view-section { display: none; flex-direction: column; flex: 1; padding: 10px; overflow-y: auto; }

        .box-input-container { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; position: relative; z-index: 50; }
        .letter-box { 
            width: 60px; height: 90px; border: 1.5px solid var(--accent) !important; border-radius: 12px; 
            background: rgba(0,0,0,0.85); color: #fff; text-align: center; font-size: 3.2rem; font-weight: 900; 
            line-height: 90px; display: inline-block; flex-shrink: 0; -webkit-appearance: none;
        }
        .letter-box.correct { border-color: var(--success) !important; }
        .letter-box.wrong { border-color: var(--danger) !important; color: var(--danger); }

        #combat-arena { height: 160px; background: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/environments/grass.png') center/cover; border-radius: 18px; position: relative; border: 2px solid #334155; margin-bottom: 10px; flex-shrink: 0; }
        .hp-container { position: absolute; width: 115px; height: 24px; background: rgba(0,0,0,0.7); border: 2px solid #fff; border-radius: 12px; overflow: hidden; }
        .hp-bar { height: 100%; width: 100%; background: var(--success); transition: 0.4s; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: 900; line-height: 20px; color: #fff; z-index: 10; }
        #player-hp-box { bottom: 95px; left: 15px; }
        #opp-hp-box { top: 15px; right: 15px; }

        .sprite { position: absolute; bottom: 8px; height: 85px; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.5)); z-index: 5; }
        #player-sprite { left: 15px; transform: scaleX(-1); }
        #opp-sprite { right: 15px; }
        @keyframes flash-red { 0% { filter: brightness(1); } 50% { filter: brightness(1.5) sepia(1) hue-rotate(-50deg); } 100% { filter: brightness(1); } }
        .take-damage { animation: flash-red 0.1s linear 4; }

        #display-cn { font-size: 3.2rem; font-weight: 900; color: var(--gold); text-shadow: 2px 2px 4px #000; display: block; text-align: center; margin-bottom: 5px; }
        .mode-btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 800; font-size: 1.25rem; color: white; margin-bottom: 10px; text-align: center; cursor: pointer; }
    </style>
</head>
<body onload="initSystem()">

<div class="container">
    <div id="view-main" class="view-section" style="display:flex;">
        <h1 style="text-align:center; color:var(--accent);">ANSON MASTER</h1>
        <div style="flex:1;">
            <select id="unit-selector" style="width:100%; padding:18px; border-radius:16px; background:#1e293b; color:var(--gold); border:2.5px solid #334155; font-weight:900; font-size:1.6rem; margin-bottom:15px;"></select>
            <button class="mode-btn" style="background: linear-gradient(45deg, #ef4444, #f59e0b);" onclick="startSession('quiz')">🗡️ 魔王挑戰 (可升級)</button>
            <button class="mode-btn" style="background: #3b82f6;" onclick="startSession('practice')">🛡️ 自由練習模式</button>
            <button class="mode-btn" style="background: var(--gold); color:#000;" onclick="startPrioritySession()">★ 星號複習 (不扣血)</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"><button class="mode-btn" style="background:#475569;" onclick="switchView('view-team')">🐲 夥伴隊伍</button><button class="mode-btn" style="background:#475569;" onclick="switchView('view-pokedex')">📸 圖鑑</button></div>
    </div>

    <div id="view-game" class="view-section">
        <div style="display:flex; justify-content:space-between;"><button class="mode-btn" style="width:auto; padding:8px 15px; background:#334155; font-size:0.9rem;" onclick="switchView('view-main')">🏠 離開</button></div>
        <div id="combat-arena">
            <div id="player-hp-box" class="hp-container"><div id="player-hp-bar" class="hp-bar"></div><div id="player-hp-text" class="hp-text">Anson: 5/5</div></div>
            <img id="player-sprite" class="sprite" src="">
            <div id="opp-hp-box" class="hp-container"><div id="opp-hp-bar" class="hp-bar" style="background:var(--danger);"></div><div id="opp-hp-text" class="hp-text">魔王: 5/5</div></div>
            <img id="opp-sprite" class="sprite" src="">
        </div>
        <div style="text-align:center; min-height:60px;">
            <span id="display-cn">...</span>
            <span id="star-icon" style="font-size:2.6rem; cursor:pointer; color:#475569;" onclick="toggleStar()">☆</span>
        </div>
        <div id="practice-guide" style="text-align:center; color:var(--accent); font-weight:900; font-size:1.8rem; height:35px;"></div>
        <div id="letter-area" class="box-input-container"></div>
        <button class="mode-btn" style="width:auto; align-self:center; background:rgba(255,255,255,0.12); padding:12px 50px;" onclick="playVoice()">🔊 再唸一次</button>
    </div>

    <div id="view-team" class="view-section"><h2 style="text-align:center;">夥伴清單</h2><div class="grid-view" id="team-grid"></div><button class="mode-btn" style="background:#3b82f6;" onclick="switchView('view-main')">確認</button></div>
    <div id="view-pokedex" class="view-section"><h2 style="text-align:center;">151圖鑑</h2><div class="grid-view" id="dex-grid"></div><button class="mode-btn" style="background:#475569;" onclick="switchView('view-main')">返回</button></div>
</div>

<script>
    const SS_ID = '1NOCryDyDFHTrZYIynihKJajUcVsCMJUcuMUozDEnsUs';
    const PK_NAMES = {1:"妙蛙種子",2:"妙蛙草",3:"妙蛙花",4:"小火龍",5:"火恐龍",6:"噴火龍",7:"傑尼龜",8:"卡咪龜",9:"水箭龜",10:"綠毛蟲",11:"鐵甲蛹",12:"巴大蝶",25:"皮卡丘",26:"雷丘",147:"迷你龍",148:"哈克龍",149:"快龍",150:"超夢",151:"夢幻",384:"烈空坐",992:"鐵臂膀"};
    
    // --- 已翻譯字典加固版 ---
    const localDict = {
        "bus driver": "公車司機", "first name": "名字", "last name": "姓氏", "bell": "鈴", "busy": "忙碌",
        "market": "市場", "money": "錢", "poor": "窮", "sell": "賣", "tub": "澡盆", "splash": "濺水", "funny-looking": "滑稽", "a couple of": "一些", "mustard": "芥末",
        "birthday": "生日", "call": "打電話", "peanut butter": "花生醬", "slug": "蛞蝓", "knock over": "撞倒", "wrestle": "摔跤", "shake head": "搖頭", "shook head": "搖頭", "sigh": "嘆氣", "attack": "攻擊", "tire": "輪胎",
        "bicycle": "腳踏車", "bus": "公車", "train": "火車", "by bus": "搭公車", "by car": "搭車", "by train": "搭火車", "motorcycle": "機車", "on foot": "走路", "sailing ship": "帆船", "transportation": "交通", "town": "城鎮", "wheel": "輪子",
        "balloon": "氣球", "cross": "跨越", "drive": "駕駛", "truck": "卡車", "wait": "等待", "corn": "玉米", "mule": "騾子", "fast": "快", "new": "新", "old": "舊",
        "short": "短", "slow": "慢", "graph": "圖表", "garage": "車庫", "opposite": "相反", "mug": "馬克杯", "handle": "把手", "anything": "任何", "begin to": "開始", "dizzy": "暈眩",
        "janitor": "工友", "zookeeper": "管理員", "cartwheel": "側手翻", "fountain": "飲水機", "frown": "皺眉", "shrink": "縮小", "yell": "大叫", "packet": "小包", "pull out": "拉出", "yawn": "打呵欠"
    };

    let state = { banks: {}, currentList: [], index: 0, mode: 'quiz', activePokeId: 384, pokedex: "0".repeat(151), playerHP: 5, oppHP: 5, currentOppId: 1 };

    function setHeroData(n, v) { localStorage.setItem(n, v); document.cookie = `${n}=${v};path=/;SameSite=Lax`; }
    function getHeroData(n) { const v = `; ${document.cookie}`; const p = v.split(`; ${n}=`); return (p.length === 2) ? p.pop().split(';').shift() : localStorage.getItem(n); }

    async function initSystem() {
        state.pokedex = getHeroData('hero_pokedex_bits') || "0".repeat(151);
        state.activePokeId = parseInt(getHeroData('hero_myPoke')) || 384;
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SS_ID}/gviz/tq?tqx=out:csv&t=${Date.now()}`);
        parseCSV(await res.text());
    }

    function parseCSV(text) {
        const rows = text.split(/\r?\n/).map(r => r.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
        state.banks = {}; rows[0].forEach((h, i) => { if(!h) return; state.banks[h] = []; for(let r=1; r<rows.length; r++) if(rows[r][i]) state.banks[h].push({ en: rows[r][i].split(',')[0], cn: rows[r][i].split(',')[1], ref: `${String.fromCharCode(65+i)}${r+1}` }); });
        document.getElementById('unit-selector').innerHTML = Object.keys(state.banks).sort((a,b)=>parseInt(b.replace(/\D/g,''))-parseInt(a.replace(/\D/g,''))).map(k => `<option value="${k}">${k}</option>`).join('');
    }

    function initArena() {
        let un = []; for(let i=0; i<151; i++) if(state.pokedex[i] === "0") un.push(i+1);
        state.currentOppId = un.length > 0 ? un[Math.floor(Math.random()*un.length)] : Math.floor(Math.random()*151)+1;
        updateHPUI(); loadWord();
    }

    function updateHPUI() {
        document.getElementById('player-hp-bar').style.width = (state.playerHP/5 * 100) + "%";
        document.getElementById('player-hp-text').innerText = `Anson: ${state.playerHP}/5`;
        document.getElementById('opp-hp-bar').style.width = (state.oppHP/5 * 100) + "%";
        document.getElementById('opp-hp-text').innerText = `魔王: ${state.oppHP}/5`;
        document.getElementById('player-sprite').src = getGif(state.activePokeId);
        document.getElementById('opp-sprite').src = getGif(state.currentOppId);
    }

    function getGif(id) { return (id >= 900) ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png` : `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/${id}.gif`; }

    function loadWord() {
        if(state.index >= state.currentList.length) { handleVictory(); return; }
        const word = state.currentList[state.index];
        let tip = localDict[word.en.toLowerCase()] || word.cn;
        document.getElementById('display-cn').innerText = tip ? tip : "⏳ (更新中)";
        
        const area = document.getElementById('letter-area'); area.innerHTML = "";
        word.en.split('').forEach((char, i) => {
            if(char === " ") area.appendChild(Object.assign(document.createElement('div'), {style:"width:100%;height:5px"}));
            else {
                const inp = document.createElement('input'); inp.className = 'letter-box'; inp.maxLength = 1;
                inp.oninput = (e) => { if(e.target.value.length === 1) { const next = inp.nextElementSibling; if(next && next.tagName === 'INPUT') next.focus(); if([...document.querySelectorAll('.letter-box')].every(b => b.value.length > 0)) setTimeout(checkFinalAnswer, 150); }};
                area.appendChild(inp);
            }
        });
        document.getElementById('practice-guide').innerText = (state.mode === 'practice') ? word.en : "";
        setTimeout(() => { const f = document.querySelector('.letter-box'); if(f) f.focus(); }, 450); playVoice();
    }

    function checkFinalAnswer() {
        const word = state.currentList[state.index]; const boxes = document.querySelectorAll('.letter-box');
        let ui = ""; boxes.forEach(b => ui += b.value);
        if (ui.toLowerCase() === word.en.replace(/[\s\/]/g, '').toLowerCase()) {
            confetti({ particleCount: 40, spread: 50 });
            if(state.mode !== 'priority') {
                state.oppHP--; document.getElementById('opp-sprite').classList.add('take-damage');
                setTimeout(()=>document.getElementById('opp-sprite').classList.remove('take-damage'), 450);
            }
            if(state.oppHP <= 0) { setTimeout(handleVictory, 500); return; }
            state.index++; updateHPUI(); setTimeout(loadWord, 600);
        } else {
            boxes.forEach(b => { b.classList.add('wrong'); setTimeout(()=>b.classList.remove('wrong'), 800); });
            if(state.mode !== 'priority') {
                state.playerHP--; document.getElementById('player-sprite').classList.add('take-damage');
                setTimeout(()=>document.getElementById('player-sprite').classList.remove('take-damage'), 450);
            }
            if(state.playerHP <= 0) { alert("體力不支，休息一下吧！"); switchView('view-main'); return; }
            updateHPUI();
        }
    }

    function handleVictory() { 
        if(state.mode !== 'priority') {
            let p = state.pokedex.split(''); p[state.currentOppId-1] = "1"; setHeroData('hero_pokedex_bits', p.join('')); 
            confetti({ particleCount: 200, spread: 100 }); alert("擊敗魔王！收服成功！"); 
        }
        switchView('view-main'); 
    }
    function startSession(m) { state.unit = document.getElementById('unit-selector').value; state.currentList = [...state.banks[state.unit]].sort(() => Math.random() - 0.5); state.mode = m; state.index = 0; state.playerHP = 5; state.oppHP = 5; switchView('view-game'); initArena(); }
    function switchView(id) { document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none'); document.getElementById(id).style.display = 'flex'; if(id === 'view-team') renderTeam(); if(id === 'view-pokedex') renderDex(); }
    function renderTeam() {
        const grid = document.getElementById('team-grid'); grid.innerHTML = "";
        let teamIds = [384, 150, 992];
        for(let i=1; i<=151; i++) { if(state.pokedex[i-1] === "1" && !teamIds.includes(i)) teamIds.push(i); }
        teamIds.forEach(id => {
            const it = document.createElement('div'); it.className = `grid-item ${state.activePokeId == id?'active':''} collected`;
            it.innerHTML = `<img src="${getGif(id)}"><div class="name-zh">${PK_NAMES[id]||id}</div>`;
            it.onclick = () => { state.activePokeId = id; setHeroData('hero_myPoke', id); renderTeam(); }; grid.appendChild(it);
        });
    }
    function renderDex() {
        const grid = document.getElementById('dex-grid'); grid.innerHTML = "";
        for(let i=1; i<=151; i++) { const status = state.pokedex[i-1]; grid.innerHTML += `<div class="grid-item ${status !== "0" ? 'collected' : 'locked'}"><img src="${getGif(i)}"><div class="name-zh">${PK_NAMES[i]||'No.'+i}</div></div>`; }
    }
    function playVoice() { window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(state.currentList[state.index].en); msg.lang = 'en-US'; window.speechSynthesis.speak(msg); }
    function toggleStar() { const word = state.currentList[state.index]; let p = JSON.parse(getHeroData('hero_priority') || '[]'); if(p.includes(word.ref)) p = p.filter(r => r !== word.ref); else p.push(word.ref); setHeroData('hero_priority', JSON.stringify(p)); document.getElementById('star-icon').innerText = p.includes(word.ref) ? "★" : "☆"; }
    function startPrioritySession() { const pRefs = JSON.parse(getHeroData('hero_priority') || '[]'); if(pRefs.length === 0) return alert("還沒有星號單字！"); state.currentList = []; Object.values(state.banks).forEach(b => b.forEach(w => { if(pRefs.includes(w.ref)) state.currentList.push(w); })); state.currentList.sort(() => Math.random() - 0.5); state.mode = 'priority'; state.index = 0; switchView('view-game'); initArena(); }
</script>
</body>
</html>
